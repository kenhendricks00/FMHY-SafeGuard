<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FMHY SafeGuard</title>
  <style>
    @font-face {
      font-family: "Inter";
      src: url("../res/fonts/inter.woff2") format("woff2");
    }

    :root {
      --background-color: rgb(26, 26, 26);
      --text-color: #848a94;
      --text-color-light: #e8e8e8;
      --accent-color: #c4b5fd;
      --link-color: #78b3e2;
      --hover-bg: rgba(255, 255, 255, 0.1);
    }

    [data-theme="light"] {
      --background-color: #f5f5f5;
      --text-color: #4b5563;
      --text-color-light: #1a1a1a;
      --accent-color: #6c63ff;
      --link-color: #0366d6;
      --hover-bg: rgba(0, 0, 0, 0.1);
    }

    [data-theme="amoled"] {
      --background-color: #000000;
      --text-color: #848a94;
      --text-color-light: #e8e8e8;
      --accent-color: #c4b5fd;
      --link-color: #78b3e2;
      --hover-bg: rgba(255, 255, 255, 0.08);
    }

    body {
      text-align: center;
      background-color: var(--background-color);
      font-family: "Inter", "Helvetica Neue", "Helvetica", "Arial", sans-serif;
      color: var(--text-color);
      margin: 0;
      padding: 10px;
      min-width: 300px;
      max-width: 320px;
      /* Limit the width to make it more compact */
      position: relative;
      /* For absolute positioning of settings button */
    }

    .header {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
      padding-right: 25px;
    }

    .title h1 {
      font-size: 24px;
      background: -webkit-linear-gradient(120deg,
          var(--accent-color) 30%,
          var(--link-color));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
      padding: 10px;
    }

    /* Settings Button */
    .settings-button {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .settings-button:hover {
      background: var(--hover-bg);
    }

    .settings-button svg {
      width: 20px;
      height: 20px;
      transition: transform 0.3s ease;
    }

    .settings-button:hover svg {
      transform: rotate(45deg);
    }

    .settings-button path {
      fill: var(--text-color);
      transition: fill 0.3s ease;
    }

    .settings-button:hover path {
      fill: var(--accent-color);
    }

    #status-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-top: 10px;
    }

    .status-image {
      width: 60px;
      /* Reduced icon size */
      height: 60px;
      transition: transform 0.3s ease;
    }

    #status-message {
      font-size: 14px;
      /* Smaller text for compact design */
      margin-top: 10px;
      color: var(--text-color-light);
      line-height: 1.3;
      padding: 0 10px;
    }

    #status-message strong {
      color: var(--accent-color);
    }

    #error-message {
      color: red;
      margin-top: 10px;
    }

    #footer {
      font-size: 11px;
      /* Smaller footer text */
      margin-top: 10px;
      color: var(--text-color);
    }

    #footer a {
      color: var(--link-color);
      text-decoration: none;
    }

    #footer a:hover {
      text-decoration: underline;
    }

    #feedback {
      font-size: 12px;
      margin-top: 10px;
      color: var(--text-color);
    }

    #feedback a {
      color: var(--link-color);
      text-decoration: none;
    }

    #feedback a:hover {
      text-decoration: underline;
    }

    /* Animation for status change */
    .status-image.active {
      transform: scale(1.1);
    }

    /* Password Section Styles */
    #password-container {
      margin-top: 15px;
      padding: 10px;
      background: var(--hover-bg);
      border-radius: 8px;
      text-align: left;
      display: none;
    }

    #password-container.visible {
      display: block;
    }

    #password-title {
      font-size: 13px;
      font-weight: 600;
      color: #4ecdc4;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #password-title svg {
      stroke: #4ecdc4;
    }

    #password-content {
      font-size: 14px;
      font-weight: 600;
      font-family: monospace;
      color: var(--text-color);
      background: var(--bg-color);
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    #password-content:hover {
      background: var(--hover-bg);
    }

    #password-content .copy-icon {
      opacity: 0.5;
      flex-shrink: 0;
    }

    #password-content:hover .copy-icon {
      opacity: 1;
    }

    #password-content.copied {
      background: #4ecdc4;
      color: #000;
    }

    /* Invite Code Section Styles */
    #invite-code-container {
      margin-top: 15px;
      padding: 10px;
      background: var(--hover-bg);
      border-radius: 8px;
      text-align: left;
      display: none;
    }

    #invite-code-container.visible {
      display: block;
    }

    #invite-code-title {
      font-size: 13px;
      font-weight: 600;
      color: #f59e0b;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #invite-code-title svg {
      stroke: #f59e0b;
    }

    #invite-code-content {
      font-size: 14px;
      font-weight: 600;
      font-family: monospace;
      color: var(--text-color);
      background: var(--bg-color);
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    #invite-code-content:hover {
      background: var(--hover-bg);
    }

    #invite-code-content .copy-icon {
      opacity: 0.5;
      flex-shrink: 0;
    }

    #invite-code-content:hover .copy-icon {
      opacity: 1;
    }

    #invite-code-content.copied {
      background: #f59e0b;
      color: #000;
    }

    /* Reason Section Styles */
    #reason-container {
      margin-top: 15px;
      padding: 10px;
      background: var(--hover-bg);
      border-radius: 8px;
      text-align: left;
      display: none;
    }

    #reason-container.visible {
      display: block;
    }

    #reason-title {
      font-size: 13px;
      font-weight: 600;
      color: #ff6b6b;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #reason-title svg {
      stroke: #ff6b6b;
    }

    #reason-content {
      font-size: 12px;
      line-height: 1.5;
      color: var(--text-color-light);
    }

    #reason-content a {
      color: #ff6b6b;
      text-decoration: none;
      word-break: break-all;
    }

    #reason-content a:hover {
      text-decoration: underline;
    }

    /* Note Section Styles */
    #note-container {
      margin-top: 15px;
      padding: 10px;
      background: var(--hover-bg);
      border-radius: 8px;
      text-align: left;
      display: none;
    }

    #note-container.visible {
      display: block;
    }

    #note-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent-color);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #note-content {
      font-size: 12px;
      line-height: 1.5;
      color: var(--text-color-light);
    }

    #note-content h4 {
      font-size: 13px;
      margin: 0 0 8px 0;
      color: var(--accent-color);
    }

    #note-content ul {
      margin: 5px 0;
      padding-left: 20px;
    }

    #note-content li {
      margin: 3px 0;
    }

    #note-content a {
      color: var(--link-color);
      text-decoration: none;
    }

    #note-content a:hover {
      text-decoration: underline;
    }

    #note-content code {
      background: rgba(0, 0, 0, 0.2);
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 11px;
    }

    #note-content img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
      margin: 8px 0;
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="title">
      <h1 data-i18n="extensionName">FMHY SafeGuard</h1>
    </div>
    <button class="settings-button" id="settingsButton" data-i18n-title="openSettings" title="Open Settings">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path
          d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.53c.04-.32.07-.65.07-.97 0-.32-.03-.65-.07-.97l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.31-.61-.22l-2.49 1c-.52-.39-1.06-.73-1.69-.98l-.37-2.65c-.04-.24-.25-.42-.5-.42h-4c-.25 0-.46.18-.5.42l-.37 2.65c-.63.25-1.17.59-1.69.98l-2.49-1c-.22-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64L4.57 12c-.04.32-.07.65-.07.97 0 .32.03.65.07.97l-2.11 1.63c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.31.61.22l2.49-1c.52.39 1.06.73 1.69.98l.37 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.37-2.65c.63-.25 1.17-.59 1.69-.98l2.49 1c.22-.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.63Z" />
      </svg>
    </button>
  </div>
  <div id="status-container">
    <img id="status-icon" class="status-image" src="safe.png" alt="Status Icon" />
    <p id="status-message" data-i18n="checkingSiteStatus">Checking site status...</p>
  </div>
  <p id="error-message"></p>
  <div id="password-container">
    <div id="password-title">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
      <span data-i18n="password">Password</span>
    </div>
    <div id="password-content">
      <span id="password-text"></span>
      <svg class="copy-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect>
        <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path>
      </svg>
    </div>
  </div>
  <div id="invite-code-container">
    <div id="invite-code-title">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z">
        </path>
        <path d="M13 5v2"></path>
        <path d="M13 17v2"></path>
        <path d="M13 11v2"></path>
      </svg>
      <span data-i18n="inviteCode">Invite Code</span>
    </div>
    <div id="invite-code-content">
      <span id="invite-code-text"></span>
      <svg class="copy-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect>
        <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path>
      </svg>
    </div>
  </div>
  <div id="reason-container">
    <div id="reason-title">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path>
        <path d="M12 9v4"></path>
        <path d="M12 17h.01"></path>
      </svg>
      <span data-i18n="reason">Reason</span>
    </div>
    <div id="reason-content"></div>
  </div>
  <div id="note-container">
    <div id="note-title">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
        <polyline points="14 2 14 8 20 8" />
        <line x1="16" y1="13" x2="8" y2="13" />
        <line x1="16" y1="17" x2="8" y2="17" />
      </svg>
      <span data-i18n="fmhyNote">FMHY Note</span>
    </div>
    <div id="note-content"></div>
  </div>
  <div id="feedback">
    <p>
      <span data-i18n="thinkMistake">Think this is a mistake?</span>
      <a href="https://github.com/fmhy/FMHY-SafeGuard/issues" target="_blank" data-i18n="letUsKnow">Let us know</a>.
    </p>
  </div>
  <div id="footer">
    <p>
      <span data-i18n="poweredBy">Powered by</span>
      <a href="https://github.com/fmhy/FMHYFilterlist" target="_blank" data-i18n="fmhyFilterlist">FMHY Filterlist</a>
    </p>
  </div>

  <script src="../js/i18n.js"></script>
  <script src="index.js"></script>
</body>

</html>
