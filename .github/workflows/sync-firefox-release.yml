name: Sync signed Firefox release

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Find latest release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG=$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName --jq .tagName)
          VERSION=${TAG#v}
          test -n "$VERSION"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download approved signed XPI
        id: signed-xpi
        env:
          ADDON_ID: ${{ vars.FIREFOX_ADDON_ID }}
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
          VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$ADDON_ID"
          TOKEN=$(python - <<'PY'
          import base64
          import hashlib
          import hmac
          import json
          import os
          import time
          import uuid

          def encode(value):
              raw = json.dumps(value, separators=(",", ":")).encode()
              return base64.urlsafe_b64encode(raw).rstrip(b"=").decode()

          now = int(time.time())
          header = encode({"alg": "HS256", "typ": "JWT"})
          payload = encode({
              "iss": os.environ["AMO_JWT_ISSUER"],
              "jti": uuid.uuid4().hex,
              "iat": now,
              "exp": now + 60,
          })
          message = f"{header}.{payload}"
          signature = hmac.new(
              os.environ["AMO_JWT_SECRET"].encode(),
              message.encode(),
              hashlib.sha256,
          ).digest()
          encoded_signature = base64.urlsafe_b64encode(signature).rstrip(b"=").decode()
          print(f"{message}.{encoded_signature}")
          PY
          )
          ENCODED_ID=$(jq -rn --arg value "$ADDON_ID" '$value|@uri')
          API="https://addons.mozilla.org/api/v5/addons/addon/${ENCODED_ID}/versions/${VERSION}/"
          HTTP_STATUS=$(curl --silent --show-error --retry 3 \
            -H "Authorization: JWT $TOKEN" \
            -o version.json -w '%{http_code}' "$API")
          if [[ "$HTTP_STATUS" == "404" ]]; then
            echo "Signed Firefox v${VERSION} is not public yet."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$HTTP_STATUS" != "200" ]]; then
            cat version.json >&2
            exit 1
          fi
          FILE_URL=$(jq -r '(.files // [])[] | select(.status == "public") | .url' version.json | head -n 1)
          if [[ -z "$FILE_URL" ]]; then
            echo "Signed Firefox v${VERSION} is not public yet."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          curl --fail-with-body --retry 3 -L "$FILE_URL" -o "FMHY-SafeGuard_v${VERSION}.firefox.xpi"
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Attach signed XPI to GitHub release
        if: steps.signed-xpi.outputs.available == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber \
            "FMHY-SafeGuard_v${VERSION}.firefox.xpi"
